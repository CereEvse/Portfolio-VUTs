<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Упражнения</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Упражнения</h1>
        <div>
            <a th:href="@{/admin-physical}" class="btn btn-sm btn-outline-secondary me-2">
                ← К администрированию ФП
            </a>
            <a th:href="@{/exercises/new}" class="btn btn-sm btn-primary">
                Добавить упражнение
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-striped align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>№ упр.</th>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Тип результата</th>
                        <th class="text-end">Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ex : ${exercises}">
                        <td th:text="${ex.id}"></td>
                        <td th:text="${ex.number}"></td>
                        <td th:text="${ex.name}"></td>
                        <td th:text="${ex.category.name() == 'STRENGTH' ? 'Сила' : (ex.category.name() == 'SPEED' ? 'Быстрота' : 'Выносливость')}"></td>
                        <td th:text="${ex.resultType.name() == 'REPS' ? 'Количество раз' : 'Время'}"></td>
                        <td class="text-end">
                            <!-- здесь может быть кнопка редактирования, если нужно -->
                            <form th:action="@{'/exercises/delete/' + ${ex.id}}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirmCascadeDelete();">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger">
                                    Удалить
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(exercises)}">
                        <td colspan="6" class="text-center text-muted py-3">
                            Упражнения пока не добавлены.
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function confirmCascadeDelete() {
        return confirm(
            "Вы уверены, что хотите удалить это упражнение?\n" +
            "Все связанные нормы начисления баллов (Прил. 10) будут удалены безвозвратно."
        );
    }
</script>

</body>
</html>
