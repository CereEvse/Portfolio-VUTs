<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание упражнения</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:insert="~{blocks/header :: header}"></div>

<main class="container py-4" style="padding-top: 4.5rem;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Создание упражнения</h1>
        <a href="/" class="btn btn-outline-secondary btn-sm">← На главную</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/exercises/new}" th:object="${exercise}" method="post">

                <div class="mb-3">
                    <label class="form-label">№ упражнения</label>
                    <input type="number" th:field="*{number}" class="form-control" required min="1">
                </div>

                <div class="mb-3">
                    <label class="form-label">Вид упражнения (название)</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Категория упражнения</label>
                    <select th:field="*{category}" class="form-select" required>
                        <option value="">— выберите категорию —</option>
                        <option th:each="c : ${categories}"
                                th:value="${c}"
                                th:text="${c.name() == 'STRENGTH' ? 'Сила' : (c.name() == 'SPEED' ? 'Быстрота' : 'Выносливость')}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Тип результата</label>
                    <select th:field="*{resultType}" class="form-select" required>
                        <option value="">— выберите тип результата —</option>
                        <option th:each="rt : ${resultTypes}"
                                th:value="${rt}"
                                th:text="${rt.name() == 'REPS' ? 'Количество раз' : 'Время'}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Возраст</label>
                    <select th:field="*{ageGroup}" class="form-select" required>
                        <option value="">— выберите возраст —</option>
                        <option th:each="ag : ${ageGroups}"
                                th:value="${ag}"
                                th:text="${ag == T(ru.accouting.student.model.Exercise.AgeGroup).ALL
                                         ? 'Все'
                                         : 'Старше 25'}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Сохранить</button>
            </form>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
