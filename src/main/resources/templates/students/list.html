<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все студенты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        html, body {
            font-family: Arial, sans-serif !important;
        }
        * {
            font-family: Arial, sans-serif !important;
        }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-4">
        <!-- Заголовок -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2><i class="bi bi-people-fill me-2 text-primary"></i>Все студенты</h2>
                <small class="text-muted">Найдено: <strong th:text="${students.size()}"></strong></small>
            </div>
            <a th:href="@{/student-applied/add}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Добавить студента
            </a>
        </div>

        <!-- ✅ ФИЛЬТРЫ -->
        <div class="row g-3 mb-4 p-3 border rounded bg-light">
            <div class="col-md-2">
                <label class="form-label fw-bold small mb-1">Год подачи</label>
                <select class="form-select form-select-sm" name="applicationYear" onchange="filterStudents()">
                    <option value="">Все годы</option>
                    <option th:each="year : ${applicationYears}"
                            th:value="${year}"
                            th:selected="${year == selectedApplicationYear}"
                            th:text="${year}"></option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label fw-bold small mb-1">Группа</label>
                <select class="form-select form-select-sm" name="groupName" onchange="filterStudents()">
                    <option value="">Все группы</option>
                    <option th:each="group : ${groups}"
                            th:value="${group.nameGroup}"
                            th:selected="${group.nameGroup == selectedGroupName}"
                            th:text="${group.nameGroup}"></option>
                </select>
            </div>

            <div class="col-md-1">
                <label class="form-label fw-bold small mb-1">Курс</label>
                <select class="form-select form-select-sm" name="course" onchange="filterStudents()">
                    <option value="">Все</option>
                    <option th:each="c : ${courses}"
                            th:value="${c}"
                            th:selected="${c == selectedCourse}"
                            th:text="${c}"></option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label fw-bold small mb-1">Институт</label>
                <select class="form-select form-select-sm" name="institute" onchange="filterStudents()">
                    <option value="">Все институты</option>
                    <option th:each="inst : ${institutes}"
                            th:value="${inst}"
                            th:selected="${inst == selectedInstitute}"
                            th:text="${inst}"></option>
                </select>
            </div>

            <div class="col-md-3">
                <div class="row g-2 h-100">
                    <div class="col-6">
                        <label class="form-label fw-bold small mb-1 d-block">Взвод</label>
                        <select class="form-select form-select-sm" name="platoonId" onchange="filterStudents()">
                            <option value="">Все</option>
                            <option th:each="pl : ${platoons}"
                                    th:value="${pl.id}"
                                    th:selected="${pl.id == selectedPlatoonId}"
                                    th:text="${pl.namePlatoon}"></option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold small mb-1 d-block">Статус</label>
                        <select class="form-select form-select-sm" name="status" onchange="filterStudents()">
                            <option value="">Все</option>
                            <option th:each="st : ${statuses}"
                                    th:value="${st}"
                                    th:selected="${st == selectedStatus}"
                                    th:text="${st.displayName}"></option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Сброс фильтров -->
        <div class="mb-3">
            <a th:href="@{/students(sortField=${sortField}, sortDir=${sortDir})}"
               class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-clockwise"></i> Сбросить фильтры
            </a>
        </div>

        <!-- ✅ СОРТИРОВКА -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="btn-group" role="group">
                    <a th:href="@{/students(sortField='lastName', sortDir='asc',
                                       applicationYear=${selectedApplicationYear},
                                       groupName=${selectedGroupName},
                                       course=${selectedCourse},
                                       specialtyTitle=${selectedSpecialtyTitle},
                                       institute=${selectedInstitute},
                                       platoonId=${selectedPlatoonId},
                                       status=${selectedStatus})}"
                       th:classappend="${sortField == 'lastName' and sortDir == 'asc'} ? 'btn-primary' : 'btn-outline-primary'"
                       class="btn btn-sm">
                        ФИО <i class="bi bi-arrow-up-short"></i>
                    </a>
                    <a th:href="@{/students(sortField='lastName', sortDir='desc',
                                       applicationYear=${selectedApplicationYear},
                                       groupName=${selectedGroupName},
                                       course=${selectedCourse},
                                       specialtyTitle=${selectedSpecialtyTitle},
                                       institute=${selectedInstitute},
                                       platoonId=${selectedPlatoonId},
                                       status=${selectedStatus})}"
                       th:classappend="${sortField == 'lastName' and sortDir == 'desc'} ? 'btn-primary' : 'btn-outline-primary'"
                       class="btn btn-sm">
                        ФИО <i class="bi bi-arrow-down-short"></i>
                    </a>
                    <a th:href="@{/students(sortField='course', sortDir='asc',
                                       applicationYear=${selectedApplicationYear},
                                       groupName=${selectedGroupName},
                                       course=${selectedCourse},
                                       specialtyTitle=${selectedSpecialtyTitle},
                                       institute=${selectedInstitute},
                                       platoonId=${selectedPlatoonId},
                                       status=${selectedStatus})}"
                       th:classappend="${sortField == 'course' and sortDir == 'asc'} ? 'btn-primary' : 'btn-outline-primary'"
                       class="btn btn-sm">
                        Курс <i class="bi bi-arrow-up-short"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- ✅ ТАБЛИЦА -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th style="width: 70px;">ID</th>
                    <th>ФИО</th>
                    <th style="width: 80px;">Возраст</th>
                    <th>Группа</th>
                    <th style="width: 90px;">Взвод</th>
                    <th style="width: 100px;">Статус</th>
                    <th style="width: 120px;">Телефон</th>
                    <th style="width: 200px;">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.idStudent}"></td>
                    <td>
                        <strong th:text="${student.lastName}"></strong>
                        <span th:text="${student.firstName != null ? student.firstName + ' ' + (student.patronymic != null ? student.patronymic : '') : ''}"></span>
                    </td>
                    <td th:text="${student.age}">
                        <small class="d-block text-muted" th:text="${student.isUnder25()} ? '&lt;25' : '&ge;25'"></small>
                    </td>
                    <td th:text="${student.groupStudent != null ? student.groupStudent.nameGroup : ''}"></td>
                    <td th:text="${student.platoon != null ? student.platoon.namePlatoon : ''}">
                <span th:if="${student.platoon != null}"
                      class="badge bg-info"
                      th:text="${student.platoon.namePlatoon}"></span>
                    </td>
                    <td th:text="${student.status != null ? student.status.displayName : ''}"></td>
                    <td th:text="${student.phoneNumber}"></td>
                    <td>
                        <div class="btn-group btn-group-sm" role="group">
                            <a th:href="@{/students/{id}/portfolio(id=${student.idStudent})}"
                               class="btn btn-outline-primary" title="Подробнее">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/student-applied/{id}/edit(id=${student.idStudent})}"
                               class="btn btn-outline-warning" title="Изменить">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/student-applied/{id}/delete(id=${student.idStudent})}"
                                  method="post" style="display: inline;"
                                  onsubmit="return confirm('Удалить студента?')">
                                <button type="submit" class="btn btn-outline-danger" title="Удалить">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Пустой список -->
        <div th:if="${students.isEmpty()}" class="alert alert-info text-center py-5">
            <i class="bi bi-people-slash display-4 text-muted mb-3 d-block"></i>
            <h5>Студенты не найдены</h5>
            <p class="mb-0">Попробуйте изменить фильтры или <a th:href="@{/students}">сбросить их</a></p>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>

<!-- ✅ JAVASCRIPT -->
<script>
    function filterStudents() {
        const url = new URL(window.location);
        const params = new URLSearchParams();

        // Все input/select с name
        document.querySelectorAll('input[name], select[name]').forEach(el => {
            if (el.value && el.value.trim()) {
                params.append(el.name, el.value.trim());
            }
        });

        // Сохраняем сортировку
        params.append('sortField', '${sortField}');
        params.append('sortDir', '${sortDir}');

        url.search = params.toString();
        window.location.href = url.toString();
    }

    // Дебаунс для input (не чаще 500мс)
    let timeout;
    document.addEventListener('input', function(e) {
        if (e.target.matches('input[name][oninput="filterStudents()"]')) {
            clearTimeout(timeout);
            timeout = setTimeout(filterStudents, 500);
        }
    });
</script>
</body>
</html>
