<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Студенты, подавшие заявление</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
<!--        <div class="d-flex justify-content-between align-items-center mb-4">-->
<!--            <h1 class="mb-0">Студенты, подавшие заявление</h1>-->
<!--            <a th:href="@{/student-applied/add}" class="btn btn-success">Добавить студента</a>-->
<!--        </div>-->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Студенты, подавшие заявление</h1>

            <div class="d-flex gap-2">
                <a th:href="@{/student-applied/export-credentials(
                applicationYear=${selectedApplicationYear},
                group=${selectedGroup},
                course=${selectedCourse},
                specialty=${selectedSpecialty},
                institute=${selectedInstitute},
                sortField=${sortField},
                sortDir=${sortDir}
        )}" class="btn btn-outline-primary">
                    Выгрузить Excel
                </a>

                <a th:href="@{/student-applied/add}" class="btn btn-success">
                    Добавить студента
                </a>
            </div>
        </div>

        <!-- Фильтры -->
        <form th:action="@{/student-applied}" method="get" class="row g-2 mb-4">
            <div class="col-md-2">
                <label class="form-label mb-1">Год подачи</label>
                <select name="applicationYear" class="form-select form-select-sm">
                    <option value="">Все</option>
                    <option th:each="y : ${applicationYears}"
                            th:value="${y}"
                            th:text="${y}"
                            th:selected="${y == selectedApplicationYear}">
                    </option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label mb-1">Группа</label>
                <select name="group" class="form-select form-select-sm">
                    <option th:value="''" th:selected="${selectedGroup == null}">Все</option>
                    <option th:each="g : ${groups}" th:value="${g.nameGroup}" th:text="${g.nameGroup}" th:selected="${g.nameGroup == selectedGroup}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label mb-1">Курс</label>
                <select name="course" class="form-select form-select-sm">
                    <option th:value="''" th:selected="${selectedCourse == null}">Все</option>
                    <option th:each="c : ${courses}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCourse}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label mb-1">Специальность</label>
                <select name="specialty" class="form-select form-select-sm">
                    <option th:value="''" th:selected="${selectedSpecialty == null}">Все</option>
                    <option th:each="sp : ${specialties}" th:value="${sp.titleSpecialty}" th:text="${sp.codeSpecialty + ' - ' + sp.titleSpecialty}" th:selected="${sp.titleSpecialty == selectedSpecialty}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label mb-1">Институт</label>
                <select name="institute" class="form-select form-select-sm">
                    <option th:value="''" th:selected="${selectedInstitute == null}">Все</option>
                    <option th:each="inst : ${institutes}" th:value="${inst}" th:text="${inst}" th:selected="${inst == selectedInstitute}"></option>
                </select>
            </div>

            <input type="hidden" name="sortField" th:value="${sortField}">
            <input type="hidden" name="sortDir" th:value="${sortDir}">

            <div class="col-12 mt-2">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Фильтровать</button>
                <a th:href="@{/student-applied}" class="btn btn-sm btn-link">Сбросить</a>
            </div>
        </form>

        <div th:if="${createdLogin}" class="alert alert-success mb-3">
            Аккаунт создан. Логин:
            <b th:text="${createdLogin}"></b>,
            пароль:
            <b th:text="${createdPassword}"></b>
        </div>

        <div th:if="${#lists.isEmpty(students)}" class="alert alert-info">Список пуст.</div>

        <div th:if="${!#lists.isEmpty(students)}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th th:each="field : ${ {'lastName', 'firstName', 'patronymic'} }">
                        <a th:href="@{/student-applied(sortField=${field}, sortDir=${reverseSortDir}, applicationYear=${selectedApplicationYear}, group=${selectedGroup}, course=${selectedCourse}, specialty=${selectedSpecialty}, institute=${selectedInstitute})}"
                           th:text="${field == 'lastName' ? 'Фамилия' : (field == 'firstName' ? 'Имя' : 'Отчество')}">
                        </a>
                    </th>
                    <th>Группа</th>
                    <th>Курс</th>
                    <th>Специальность</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student, stat : ${students}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${student.lastName}"></td>
                    <td th:text="${student.firstName}"></td>
                    <td th:text="${student.patronymic}"></td>
                    <td th:text="${student.groupStudent?.nameGroup}"></td>
                    <td th:text="${student.course}"></td>
                    <td th:text="${student.groupStudent?.specialty?.codeSpecialty} + ' - ' + ${student.groupStudent?.specialty?.titleSpecialty}"></td>
                    <td class="text-nowrap">
                        <form th:action="@{|/student-applied/${student.idStudent}/delete|}" method="post" class="d-inline-block">
                            <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Удалить?')">Удалить</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
