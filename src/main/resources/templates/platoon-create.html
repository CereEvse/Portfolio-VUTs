<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Создать взвод</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
        <h1 class="mb-4">Создать взвод</h1>

        <form th:action="@{/platoons/create}" method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Название взвода</label>
                <input type="text" name="namePlatoon" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Программа подготовки</label>
                <select name="specialtyId" class="form-select" required>
                    <option value="">Выберите программу</option>
                    <option th:each="s : ${specialties}"
                            th:value="${s.id}"
                            th:text="${s.code + ' - ' + s.title}">
                    </option>
                </select>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a th:href="@{/platoons}" class="btn btn-link">Отмена</a>
            </div>
        </form>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
