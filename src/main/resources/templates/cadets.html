<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Курсанты и взводы</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Курсанты со статусом CADET</h1>
        </div>

        <div th:if="${#lists.isEmpty(cadets)}" class="alert alert-info">
            Курсанты не найдены.
        </div>

        <div th:if="${!#lists.isEmpty(cadets)}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>ФИО</th>
                    <th>Статус</th>
                    <th>Текущий взвод</th>
                    <th>Назначить во взвод</th>
                    <th>Действие</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student, stat : ${cadets}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${student.lastName + ' ' + student.firstName + ' ' + student.patronymic}"></td>
                    <td th:text="${student.status}"></td>
                    <td th:text="${student.platoon != null ? student.platoon.namePlatoon : 'Не назначен'}"></td>
                    <td>
                        <form th:action="@{/cadets/assign}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="studentId" th:value="${student.idStudent}">
                            <select name="platoonId" class="form-select form-select-sm" required>
                                <option value="">Выберите взвод</option>
                                <option th:each="p : ${platoons}"
                                        th:value="${p.id}"
                                        th:text="${p.namePlatoon}">
                                </option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Назначить</button>
                        </form>
                    </td>
                    <td>
                        <span class="text-muted">Сохранение через форму</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
