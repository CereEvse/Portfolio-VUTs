<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Специальность</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        .card-form {
            max-width: 720px;
            margin: 0 auto;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 0 auto;
        }

        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>
<main>
    <div class="container">
        <h1 class="mb-4" th:text="${formTitle}">Специальность</h1>

        <form th:object="${specialty}"
              th:action="@{${specialty.id} == null ? '/specialties' : '/specialties/' + ${specialty.id}}"
              method="post">

            <div class="mb-3">
                <label class="form-label" for="code">Код специальности</label>
                <input id="code" type="text" class="form-control"
                       placeholder="09.03.02"
                       th:field="*{codeSpecialty}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="title">Название специальности</label>
                <input id="title" type="text" class="form-control"
                       placeholder="Информационные системы и технологии"
                       th:field="*{titleSpecialty}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="institute">Институт</label>
                <input id="institute" type="text" class="form-control"
                       placeholder="ИЦС"
                       th:field="*{institute}" required>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/specialties}" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</main>
<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
