<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Учебная группа</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        .card-form {
            max-width: 720px;
            margin: 0 auto;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1 0 auto;
        }

        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>
<main>
    <div class="container">
        <h1 class="mb-4" th:text="${formTitle}">Учебная группа</h1>

        <!-- Создание -->
        <form th:if="${group.id} == null"
              th:object="${group}"
              th:action="@{/groups}"
              method="post">

            <div class="mb-3">
                <label class="form-label" for="nameGroup">Название группы</label>
                <input id="nameGroup" type="text" class="form-control"
                       placeholder="ЦИС-11"
                       th:field="*{nameGroup}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="course">Курс</label>
                <input id="course" type="number" min="1" max="6"
                       class="form-control"
                       placeholder="1"
                       th:field="*{course}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="specialty">Специальность</label>
                <select id="specialty" class="form-select" th:field="*{specialty}" required>
                    <option value="">-- Выберите специальность --</option>
                    <option th:each="spec : ${specialties}"
                            th:value="${spec.id}"
                            th:text="${spec.codeSpecialty + ' - ' + spec.titleSpecialty}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/groups}" class="btn btn-secondary ms-2">Отмена</a>
        </form>

        <!-- Редактирование -->
        <form th:if="${group.id} != null"
              th:object="${group}"
              th:action="@{/groups/{id}(id=${group.id})}"
              method="post">

            <div class="mb-3">
                <label class="form-label" for="nameGroupEdit">Название группы</label>
                <input id="nameGroupEdit" type="text" class="form-control"
                       placeholder="ЦИС-11"
                       th:field="*{nameGroup}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="courseEdit">Курс</label>
                <input id="courseEdit" type="number" min="1" max="6"
                       class="form-control"
                       placeholder="1"
                       th:field="*{course}" required>
            </div>

            <div class="mb-3">
                <label class="form-label" for="specialtyEdit">Специальность</label>
                <select id="specialtyEdit" class="form-select" th:field="*{specialty}" required>
                    <option value="">-- Выберите специальность --</option>
                    <option th:each="spec : ${specialties}"
                            th:value="${spec.id}"
                            th:text="${spec.codeSpecialty + ' - ' + spec.titleSpecialty}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/groups}" class="btn btn-secondary ms-2">Отмена</a>
        </form>
    </div>
</main>
<div th:insert="~{blocks/footer :: footer}"></div>
</body>
</html>
