<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавление военкомата</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
        <div class="card shadow" style="max-width: 720px; margin: 0 auto;">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Добавление военкомата</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/military-commissariats/add}"
                      th:object="${commissariat}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Название военкомата</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/military-commissariats}"
                           class="btn btn-outline-secondary">Отмена</a>
                        <button type="submit" class="btn btn-success">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
