<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Фильтр взводов</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1 0 auto; }
        footer { flex-shrink: 0; }
    </style>
</head>
<body>
<div th:insert="~{blocks/header :: header}"></div>

<main>
    <div class="container mt-5 pt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Фильтр списка студентов</h1>
        </div>

        <form th:action="@{/platoons/filter}" method="get" class="row g-2 mb-4">
            <div class="col-md-5">
                <label class="form-label mb-1">Программа подготовки</label>
                <select name="specialtyId" class="form-select form-select-sm">
                    <option value="">Все</option>
                    <option th:each="s : ${specialties}"
                            th:value="${s.id}"
                            th:text="${s.code + ' - ' + s.title}"
                            th:selected="${selectedSpecialtyId != null and selectedSpecialtyId == s.id}">
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label mb-1">Название взвода</label>
                <select name="platoonId" class="form-select form-select-sm">
                    <option value="">Все</option>
                    <option th:each="p : ${platoons}"
                            th:value="${p.id}"
                            th:text="${p.namePlatoon}"
                            th:selected="${selectedPlatoonId != null and selectedPlatoonId == p.id}">
                    </option>
                </select>
            </div>

            <div class="col-12 mt-2 d-flex gap-2 align-items-center">
                <form th:action="@{/platoons/filter}" method="get" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-secondary">Фильтровать</button>
                </form>

                <a th:href="@{/platoons/filter}" class="btn btn-sm btn-link">Сбросить</a>

                <form th:action="@{/platoons/transfer-next-course}" method="post" class="d-inline ms-2">
                    <button type="submit" class="btn btn-sm btn-primary" onclick="return confirm('Перевести студентов на следующий курс?')">
                        Перевести на новый курс
                    </button>
                </form>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(students)}" class="alert alert-info">
            Список пуст.
        </div>

        <div th:if="${!#lists.isEmpty(students)}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>ФИО</th>
                    <th>Взвод</th>
                    <th>Программа взвода</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student, stat : ${students}">
                    <td th:text="${stat.index + 1}"></td>
                    <td th:text="${student.lastName + ' ' + student.firstName + ' ' + student.patronymic}"></td>
                    <td th:text="${student.platoon != null ? student.platoon.namePlatoon : ''}"></td>
                    <td th:text="${student.platoon != null && student.platoon.specialty != null ? student.platoon.specialty.code + ' - ' + student.platoon.specialty.title : ''}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:insert="~{blocks/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
